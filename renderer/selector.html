<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Select Capture Source</title>
  <link rel="stylesheet" href="selector.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <h2>Record your screen</h2>
      <button class="close-btn" id="closeBtn">&times;</button>
    </div>
    
    <div class="tabs">
      <button class="tab active" id="tabScreens">Screens</button>
      <button class="tab" id="tabWindows">Windows</button>
    </div>

    <div class="source-list" id="sourceList">
      <!-- Sources will be dynamically populated here -->
      <div class="loading">Loading available sources...</div>
    </div>

    <div class="actions">
      <button class="btn btn-secondary" id="cancelBtn">Cancel</button>
      <button class="btn btn-primary" id="confirmBtn" disabled>Share Screen</button>
    </div>
  </div>

  <script src="selector.js"></script>
</body>
</html>
