<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Camera Bubble</title>
  <link rel="stylesheet" href="camera.css">
</head>
<body>
  <div class="camera-container" id="cameraContainer">
    <video id="webcam" autoplay playsinline muted></video>
    
    <!-- Controls Overlay (visible on hover) -->
    <div class="overlay-controls" id="overlayControls">
      <button class="control-btn size-btn" id="sizeS" data-size="small" title="Small size">S</button>
      <button class="control-btn size-btn" id="sizeM" data-size="medium" title="Medium size">M</button>
      <button class="control-btn size-btn" id="sizeL" data-size="large" title="Large size">L</button>
      <button class="control-btn" id="flipBtn" title="Mirror Camera">
        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M16 3h5v5M4 20L21 3M21 16v5h-5M15 15l6 6M4 4l6 6"></path>
        </svg>
      </button>
      <button class="control-btn close-btn" id="closeCamBtn" title="Close Camera">
        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>
    </div>
  </div>

  <script src="camera.js"></script>
</body>
</html>
